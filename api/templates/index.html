<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>✈ Flight Price Predictor</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

.result {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>✈ Flight Price Predictor</h1>

<div class="container">

<input id="travelCode" placeholder="Travel Code (TC001)">
<input id="userCode" placeholder="User Code">
<input id="from" placeholder="From (Delhi)">
<input id="to" placeholder="To (Mumbai)">
<input id="flightType" placeholder="Flight Type (Economy)">
<input id="time" placeholder="Time">
<input id="distance" placeholder="Distance">
<input id="agency" placeholder="Agency">
<input id="date" placeholder="Date (MM/DD/YYYY)">

<button onclick="predict()">Predict Price</button>

<div class="result" id="result"></div>

</div>

<script>
async function predict() {
    const data = {
        travelCode: document.getElementById("travelCode").value,
        userCode: Number(document.getElementById("userCode").value),
        from: document.getElementById("from").value,
        to: document.getElementById("to").value,
        flightType: document.getElementById("flightType").value,
        time: Number(document.getElementById("time").value),
        distance: Number(document.getElementById("distance").value),
        agency: document.getElementById("agency").value,
        date: document.getElementById("date").value
    };

    try {
        const response = await fetch("/predict-price")
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("result").innerText =
            "💰 Price: " + result.price;

    } catch (error) {
        document.getElementById("result").innerText =
            "❌ Error connecting API";
    }
}
</script>

</body>
</html>
