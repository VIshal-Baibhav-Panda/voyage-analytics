<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>✈ Voyage Analytics</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 30px;
}

h1 {
    margin-bottom: 20px;
}

.container {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #2a5298;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1e3c72;
}

.result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>✈ Voyage Analytics</h1>

<div class="container">

<input id="travelCode" placeholder="Travel Code (TC001)">
<input id="userCode" placeholder="User Code">
<input id="from" placeholder="From (Delhi)">
<input id="to" placeholder="To (Mumbai)">
<input id="flightType" placeholder="Flight Type (Economy)">
<input id="time" placeholder="Time">
<input id="distance" placeholder="Distance">
<input id="agency" placeholder="Agency">
<input id="date" placeholder="Date (MM/DD/YYYY)">

<button onclick="predictPrice()">💰 Predict Price</button>
<button onclick="predictGender()">🧑 Predict Gender</button>
<button onclick="recommend()">🌍 Get Recommendations</button>

<div class="result" id="result"></div>

</div>

<script>

// 🔥 PRICE PREDICTION
async function predictPrice() {

    const data = {
        travelCode: document.getElementById("travelCode").value,
        userCode: Number(document.getElementById("userCode").value),
        from: document.getElementById("from").value,
        to: document.getElementById("to").value,
        flightType: document.getElementById("flightType").value,
        time: Number(document.getElementById("time").value),
        distance: Number(document.getElementById("distance").value),
        agency: document.getElementById("agency").value,
        date: document.getElementById("date").value
    };

    const res = await fetch("/predict-price", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerText =
        "💰 Price: " + result.predicted_price;
}

<button onclick="fullAnalysis()">🚀 Full Analysis</button>

// 🔥 GENDER
async function predictGender() {

    const userCode = document.getElementById("userCode").value;

    const res = await fetch("/predict-gender", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({userCode: userCode})
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        "🧑 Gender: " + data.gender;
}


// 🔥 RECOMMENDATION
async function recommend() {

    const from = document.getElementById("from").value;

    const res = await fetch("/recommend", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({from: from})
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        "🌍 Suggestions: " + data.recommendations.join(", ");
}

async function fullAnalysis() {

    const data = {
        travelCode: document.getElementById("travelCode").value,
        userCode: Number(document.getElementById("userCode").value),
        from: document.getElementById("from").value,
        to: document.getElementById("to").value,
        flightType: document.getElementById("flightType").value,
        time: Number(document.getElementById("time").value),
        distance: Number(document.getElementById("distance").value),
        agency: document.getElementById("agency").value,
        date: document.getElementById("date").value
    };

    const res = await fetch("/full-analysis", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerText =
        `💰 Price: ${result.price}
🧑 Gender: ${result.gender}
🌍 Suggestions: ${result.recommendations.join(", ")}`;
}

</script>

</body>
</html>
